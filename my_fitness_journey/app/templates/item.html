<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détail Article - IMT Market</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Chargement du CSS statique -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="d-flex flex-column min-vh-100 bg-light">

    <!-- NAVBAR (Dupliquée) -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand text-primary" href="/">🛍️ IMT Market</a>
            <!-- Zone dynamique gérée par app.js -->
            <ul class="navbar-nav ms-auto" id="auth-links"></ul>
        </div>
    </nav>

    <div class="container py-5 flex-grow-1">
        <!-- Zone d'affichage du produit -->
        <div id="item-container" class="row gx-5">
            <div class="text-center py-5 w-100">
                <div class="spinner-border text-primary"></div>
                <p>Chargement de l'article...</p>
            </div>
        </div>
    </div>

    <!-- FOOTER (Dupliqué) -->
    <footer class="bg-white py-4 mt-auto border-top">
        <div class="container text-center text-muted"><small>&copy; 2025 IMT Marketplace</small></div>
    </footer>


    <!-- MODALE ACHAT -->
    <div class="modal fade" id="buyModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-light">
                    <h5 class="modal-title fw-bold">Confirmer l'achat</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p class="mb-1">Article : <strong id="modal-title"></strong></p>
                    <p class="text-primary fs-4 text-end fw-bold" id="modal-price"></p>
                    <div class="alert alert-info small py-2 mt-2">
                        <i class="bi bi-shield-check"></i> Le prix inclut la Protection Acheteur.
                    </div>
                    <hr>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Adresse de livraison</label>
                        <select class="form-select" id="address-select">
                            <option value="">Chargement...</option>
                        </select>
                        <div class="form-text mt-2">
                            Pas d'adresse ? <a href="/profile.html">Ajoutez-en une ici</a>.
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
                    <button type="button" class="btn btn-success px-4" onclick="confirmPurchase()">Payer</button>
                </div>
            </div>
        </div>
    </div>


    <!-- SCRIPTS (Dupliqués) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/api.js') }}"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const listingId = params.get("id");
        let currentItem = null;

        document.addEventListener("DOMContentLoaded", () => {
            if (!listingId) window.location.href = "/"; // Si pas d'ID, retour accueil
            loadItemDetails();
        });

        async function loadItemDetails() {
            try {
                // 1. Récupération de l'article (Le service renvoie les totaux et photos)
                const item = await callApi(`/api/listings/${listingId}`);
                currentItem = item;
                
                const imgUrl = (item.photos && item.photos.length > 0) ? item.photos[0].url : "https://via.placeholder.com/600x400?text=No+Image";
                const userEmail = localStorage.getItem("user_email");
                const isOwner = (userEmail === item.seller_email);
                const isSold = (item.status === 'sold');

                // Boutons d'action
                let btnHtml = '';
                if (isOwner) {
                    // Option Supprimer pour le propriétaire (si non vendu)
                    btnHtml = isSold ? 
                        `<button class="btn btn-secondary w-100 mt-3" disabled>VENDU</button>` :
                        `<button class="btn btn-outline-danger w-100 mt-3" onclick="deleteItem()">🗑️ Supprimer l'annonce</button>`;
                } else if (isSold) {
                    btnHtml = `<button class="btn btn-secondary w-100 mt-3" disabled>❌ Article Vendu</button>`;
                } else if (userEmail) {
                    // Utilisateur connecté peut acheter
                    btnHtml = `<button class="btn btn-primary btn-lg w-100 mt-3 shadow-sm" onclick="openBuyModal()">💳 Acheter maintenant</button>`;
                } else {
                    // Visiteur non connecté
                    btnHtml = `<a href="/login.html" class="btn btn-primary w-100 mt-3">Connectez-vous pour acheter</a>`;
                }

                // Affichage du total avec assurance (reçu par le service GET /api/listings/{id})
                const totalText = item.total_cents ? formatMoney(item.total_cents) : "Non disponible";
                
                const html = `
                    <div class="col-md-6 mb-4">
                        <img src="${imgUrl}" class="img-fluid rounded shadow-sm w-100 bg-white" style="max-height: 500px; object-fit: contain;">
                    </div>
                    <div class="col-md-6">
                        <div class="d-flex justify-content-between align-items-start">
                            <h1 class="fw-bold mb-2">${item.title}</h1>
                            ${isSold ? '<span class="badge bg-secondary">VENDU</span>' : '<span class="badge bg-success">DISPONIBLE</span>'}
                        </div>
                        
                        <h2 class="text-primary fw-bold my-3">${formatMoney(item.price_cents)}</h2>
                        <p class="text-muted small mb-4">+ ${formatMoney(item.shipping_cents)} frais de port</p>
                        
                        <div class="card bg-light border-0 p-3 mb-4 rounded-3">
                            <h6 class="fw-bold text-muted mb-2">Description</h6>
                            <p class="mb-0 text-dark" style="white-space: pre-wrap;">${item.description}</p>
                        </div>

                        <div class="p-3 border rounded-3 mb-4">
                            <h6 class="fw-bold">Total TTC estimé : ${totalText}</h6>
                            <small class="text-muted">(Article + Port + Assurance)</small>
                        </div>

                        ${btnHtml}
                    </div>
                `;
                document.getElementById("item-container").innerHTML = html;

            } catch (err) {
                document.getElementById("item-container").innerHTML = `<div class="alert alert-danger w-100">Article introuvable ou erreur de connexion.</div>`;
            }
        }

        async function openBuyModal() {
            const modal = new bootstrap.Modal(document.getElementById('buyModal'));
            const select = document.getElementById('address-select');
            
            // Afficher le prix final dans la modale
            document.getElementById('modal-title').innerText = currentItem.title;
            document.getElementById('modal-price').innerText = formatMoney(currentItem.total_cents);
            
            select.innerHTML = '<option value="">Chargement...</option>';
            
            // Charger les adresses de l'utilisateur connecté
            try {
                const addrs = await callApi('/api/addresses');
                select.innerHTML = '<option value="">Choisir une adresse</option>';
                
                if(addrs.length === 0) {
                    select.innerHTML = '<option value="">Aucune adresse trouvée</option>';
                } else {
                    addrs.forEach(a => {
                        const opt = document.createElement('option');
                        opt.value = a.id;
                        opt.innerText = `${a.line1}, ${a.city}`;
                        select.appendChild(opt);
                    });
                }
                modal.show();
            } catch(e) {
                alert("Impossible de charger vos adresses.");
            }
        }

        async function confirmPurchase() {
            const addrId = document.getElementById('address-select').value;
            if(!addrId) return alert("Veuillez sélectionner une adresse.");

            try {
                // APPEL ACHAT (POST /api/purchases)
                await callApi('/api/purchases', 'POST', {
                    listing_id: parseInt(listingId),
                    address_id: parseInt(addrId)
                });
                
                // Fermer la modale
                const modalEl = document.getElementById('buyModal');
                const modal = bootstrap.Modal.getInstance(modalEl);
                modal.hide();

                alert("🎉 Achat réussi ! Votre commande est en cours de traitement.");
                window.location.href = "/profile.html"; // Redirection vers les commandes
                
            } catch(err) {
                alert("Erreur d'achat : " + err.message); // Affiche "Solde insuffisant" si besoin
            }
        }

        async function deleteItem() {
            if(!confirm("Êtes-vous sûr de vouloir supprimer cette annonce ?")) return;
            try {
                await callApi(`/api/listings/${listingId}`, 'DELETE');
                alert("Annonce supprimée.");
                window.location.href = "/";
            } catch(err) { alert(err.message); }
        }
    </script>
</body>
</html>
